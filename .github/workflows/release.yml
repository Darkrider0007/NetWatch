name: Build and Release NetWatch

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:

    runs-on: windows-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download GeoLite2 Database
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path resources\geoip | Out-Null
          Invoke-WebRequest `
            -Uri "https://git.io/GeoLite2-Country.mmdb" `
            -OutFile "resources\geoip\GeoLite2-Country.mmdb"

      - name: Build Executable
        run: |
          pyinstaller main.spec

      - name: Prepare Release Folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist\NetWatch release\NetWatch -Recurse

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path release\NetWatch `
            -DestinationPath NetWatch-${{ github.ref_name }}-Windows.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: NetWatch-${{ github.ref_name }}-Windows.zip
          generate_release_notes: true
          